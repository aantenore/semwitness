name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Node 24 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - name: Verify committed plugin artifacts
        if: runner.os != 'Windows'
        run: >-
          git diff --exit-code --
          plugins/semwitness/dist/cli.mjs
          plugins/semwitness/LICENSE
          plugins/semwitness/THIRD_PARTY_NOTICES
      - run: node plugins/semwitness/dist/cli.mjs --help
      - name: Verify Node plugin launcher
        run: node plugins/semwitness/scripts/semwitness.mjs --help
      - name: Verify POSIX plugin launcher
        if: runner.os != 'Windows'
        run: plugins/semwitness/scripts/semwitness.sh --help
      - name: Verify PowerShell plugin launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./plugins/semwitness/scripts/semwitness.ps1 --help
      - run: pnpm pack --dry-run
      - name: Verify installed npm CLI
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/semwitness-package" "$RUNNER_TEMP/semwitness-install"
          package_path=$(pnpm pack \
            --pack-destination "$RUNNER_TEMP/semwitness-package" | tail -n 1)
          test -f "$package_path"
          npm install --ignore-scripts --prefix "$RUNNER_TEMP/semwitness-install" \
            "$package_path"
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" --version
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" --help
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" intent passport create --help \
            | grep -Fx 'Usage: semwitness intent passport create [options]'
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" intent passport inspect --help \
            | grep -Fx 'Usage: semwitness intent passport inspect [options]'
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" intent admission create --help \
            | grep -Fx 'Usage: semwitness intent admission create [options]'
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" intent admission inspect --help \
            | grep -Fx 'Usage: semwitness intent admission inspect [options]'
          test -f "$RUNNER_TEMP/semwitness-install/node_modules/semwitness/dist/intent-host/index.js"
          test -f "$RUNNER_TEMP/semwitness-install/node_modules/semwitness/dist/intent-host/index.d.ts"
          cd "$RUNNER_TEMP/semwitness-install"
          QUALIFICATION_SOURCE="$GITHUB_WORKSPACE/test/fixtures/intent-cache-shadow-qualification.json" \
          QUALIFICATION_OUT="$RUNNER_TEMP/installed-qualification.json" \
          node --input-type=module -e '
            const fs = await import("node:fs");
            const api = await import("semwitness/intent/host");
            const source = JSON.parse(fs.readFileSync(process.env.QUALIFICATION_SOURCE, "utf8"));
            const qualification = api.parseIntentCacheShadowQualificationManifest(source);
            fs.writeFileSync(
              process.env.QUALIFICATION_OUT,
              api.serializeIntentCacheShadowQualificationManifest(qualification)
            );
          '
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" intent passport create \
            --qualification "$RUNNER_TEMP/installed-qualification.json" \
            --statement-out "$RUNNER_TEMP/installed-passport.statement.json" \
            --json
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" intent passport inspect \
            --statement "$RUNNER_TEMP/installed-passport.statement.json" \
            --qualification "$RUNNER_TEMP/installed-qualification.json" \
            --json
          test -s "$RUNNER_TEMP/installed-passport.statement.json"
          cd "$GITHUB_WORKSPACE"
          EVIDENCE_OUT="$RUNNER_TEMP/installed-admission-evidence" \
          pnpm exec tsx --eval '
            import { mkdirSync, writeFileSync } from "node:fs";
            import { join } from "node:path";
            import { canonicalJson, toJsonValue } from "./src/domain/canonical-json.ts";
            import { serializeCacheHitWitnessArtifact } from "./src/intent/index.ts";
            import { createUnsafeHitIntentPromotionFixture } from "./test/support/intent-promotion-qualification-fixture.ts";
            const root = process.env.EVIDENCE_OUT;
            if (root === undefined) throw new Error("missing EVIDENCE_OUT");
            const candidate = createUnsafeHitIntentPromotionFixture().cases[0];
            if (
              candidate === undefined ||
              (candidate.kind !== "population-complete" && candidate.kind !== "adversarial-complete") ||
              candidate.path.kind !== "candidate-bearing"
            ) throw new Error("missing candidate-bearing fixture");
            mkdirSync(root, { recursive: true });
            writeFileSync(join(root, "cache-hit-witness.json"), serializeCacheHitWitnessArtifact(candidate.path.cacheHitWitness));
            writeFileSync(join(root, "normalization-witness.json"), canonicalJson(toJsonValue(candidate.path.normalizationWitness)));
            writeFileSync(join(root, "operation-binding.json"), canonicalJson(toJsonValue(candidate.path.operationBinding)));
            writeFileSync(join(root, "entry-source-binding.json"), canonicalJson(toJsonValue(candidate.path.entrySourceBinding)));
            writeFileSync(join(root, "candidate-value.bin"), "candidate-artifact:true");
          '
          export SEMWITNESS_INSTALL_ADMISSION_SECRET='0123456789abcdef0123456789abcdef'
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" intent admission create \
            --qualification "$RUNNER_TEMP/installed-qualification.json" \
            --passport "$RUNNER_TEMP/installed-passport.statement.json" \
            --cache-hit-witness "$RUNNER_TEMP/installed-admission-evidence/cache-hit-witness.json" \
            --normalization-witness "$RUNNER_TEMP/installed-admission-evidence/normalization-witness.json" \
            --operation-binding "$RUNNER_TEMP/installed-admission-evidence/operation-binding.json" \
            --entry-source-binding "$RUNNER_TEMP/installed-admission-evidence/entry-source-binding.json" \
            --cache-key-secret-env SEMWITNESS_INSTALL_ADMISSION_SECRET \
            --value-file "$RUNNER_TEMP/installed-admission-evidence/candidate-value.bin" \
            --statement-out "$RUNNER_TEMP/installed-admission.statement.json" \
            --json > "$RUNNER_TEMP/installed-admission-create.json"
          "$RUNNER_TEMP/semwitness-install/node_modules/.bin/semwitness" intent admission inspect \
            --statement "$RUNNER_TEMP/installed-admission.statement.json" \
            --qualification "$RUNNER_TEMP/installed-qualification.json" \
            --passport "$RUNNER_TEMP/installed-passport.statement.json" \
            --cache-hit-witness "$RUNNER_TEMP/installed-admission-evidence/cache-hit-witness.json" \
            --normalization-witness "$RUNNER_TEMP/installed-admission-evidence/normalization-witness.json" \
            --operation-binding "$RUNNER_TEMP/installed-admission-evidence/operation-binding.json" \
            --entry-source-binding "$RUNNER_TEMP/installed-admission-evidence/entry-source-binding.json" \
            --cache-key-secret-env SEMWITNESS_INSTALL_ADMISSION_SECRET \
            --value-file "$RUNNER_TEMP/installed-admission-evidence/candidate-value.bin" \
            --json > "$RUNNER_TEMP/installed-admission-inspect.json"
          CREATE_RESULT="$RUNNER_TEMP/installed-admission-create.json" \
          INSPECT_RESULT="$RUNNER_TEMP/installed-admission-inspect.json" \
          node --input-type=module -e '
            const fs = await import("node:fs");
            const created = JSON.parse(fs.readFileSync(process.env.CREATE_RESULT, "utf8"));
            const inspected = JSON.parse(fs.readFileSync(process.env.INSPECT_RESULT, "utf8"));
            if (created.created !== true || created.servingAuthority !== "none") {
              throw new Error("installed admission create failed");
            }
            if (inspected.bound !== true || inspected.canonicalPayload !== true || inspected.servingAuthority !== "none") {
              throw new Error("installed admission inspect failed");
            }
          '
          cd "$RUNNER_TEMP/semwitness-install"
          node --input-type=module -e '
            const api = await import("semwitness/intent/host");
            for (const name of [
              "parseIntentCacheShadowQualificationManifest",
              "serializeIntentCacheShadowQualificationManifest",
              "digestIntentCacheShadowQualificationManifest",
              "evaluateIntentCachePromotionEvidence",
              "parseIntentCachePromotionEvidenceJsonl",
              "parseIntentCacheOperationBinding",
              "parseIntentCacheLookupReceipt",
              "parseIntentNormalizationBypassReceipt",
              "createIntentCacheAdmissionPassportStatement",
              "parseIntentCacheAdmissionPassportStatement",
              "serializeIntentCacheAdmissionPassportStatement",
              "digestIntentCacheAdmissionPassportCanonicalProfile",
              "verifyIntentCacheAdmissionPassportStatementBinding",
              "createIntentCacheAdmissionDecisionStatement",
              "parseIntentCacheAdmissionDecisionStatement",
              "serializeIntentCacheAdmissionDecisionStatement",
              "digestIntentCacheAdmissionDecisionCanonicalProfile",
              "verifyIntentCacheAdmissionDecisionStatementBinding"
            ]) {
              if (typeof api[name] !== "function") throw new Error(`missing ${name}`);
            }
            const intent = await import("semwitness/intent");
            if (typeof intent.hmacCacheArtifactCommitments !== "function") {
              throw new Error("missing hmacCacheArtifactCommitments");
            }
          '

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
