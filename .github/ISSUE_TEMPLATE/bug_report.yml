name: Bug report
description: Report a reproducible SemWitness defect without private content.
title: '[bug] '
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Safety check
      options:
        - label: I removed prompts, source code, secrets, and private CAS objects from this report.
          required: true
        - label: I will use private vulnerability reporting if this could expose or mutate protected content.
          required: true
  - type: input
    attributes:
      label: SemWitness version or commit
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Use the smallest synthetic fixture, policy, command, and reason codes.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected invariant
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: OS, Node version, filesystem, tokenizer ID/fingerprint, and codec version.
    validations:
      required: true
